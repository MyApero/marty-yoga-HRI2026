model_path = "pose_landmarker_full.task"
marty = "usb:///dev/ttyUSB0"

[film_settings]
contrast = 1.2
brightness = -20
grain_intensity = 20
line_thickness = 5
head_radius_multiplier = 0.6

[colors]
skeleton_color = [255, 255, 255]
joint_dot_size = 2

[skeleton]
joint_connections = [
    { name = "R-Hand", angles = ["R-Wrist"], joint = [15, 19] },
    { name = "L-Hand", angles = ["L-Wrist"], joint = [16, 20] },
    { name = "R-Forearm", angles = ["R-Elbow", "R-Wrist"], joint = [13, 15] },
    { name = "L-Forearm", angles = ["L-Elbow", "L-Wrist"], joint = [14, 16] },
    { name = "R-Upper-Arm", angles = ["R-Elbow", "R-Shoulder"], joint = [11, 13] },
    { name = "L-Upper-Arm", angles = ["L-Elbow", "L-Shoulder"], joint = [12, 14] },
    { name = "R-Lower-leg", angles = ["R-Knee", "R-Ankle"], joint = [25, 27] },
    { name = "L-Lower-leg", angles = ["L-Knee", "L-Ankle"], joint = [26, 28] },
    { name = "R-Leg", angles = ["R-Knee", "R-Hip"], joint = [23, 25] },
    { name = "L-Leg", angles = ["L-Knee", "L-Hip"], joint = [24, 26] },
    { name = "Hips", angles = ["R-Hip", "L-Hip"], joint = [23, 24] },
    { name = "Shoulders", angles = ["R-Shoulder", "L-Shoulder"], joint = [11, 12] },
    { name = "Neck", angles = ["Spine-Alignment"], joint = [999, 998] },
    { name = "Spine", angles = ["Spine"], joint = [998, 997] },
    { name = "R-Foot", angles = ["R-Ankle"], joint = [27, 31] },
    { name = "L-Foot", angles = ["L-Ankle"], joint = [28, 32] },
]

[feedback]
angles = [
    { name = "R-Wrist", points = [[13, 15, 19]]},
    { name = "L-Wrist", points = [[14, 16, 20]]},
    { name = "R-Elbow", points = [[11, 13, 15]] },
    { name = "L-Elbow", points = [[12, 14, 16]] },
    { name = "R-Shoulder", points = [[13, 11, 12], [13, 11, 23]] },
    { name = "L-Shoulder", points = [[14, 12, 11], [14, 12, 24]] },
    { name = "R-Knee",  points = [[23, 25, 27]] },
    { name = "L-Knee",  points = [[24, 26, 28]] },
    { name = "R-Hip", points = [[25, 23, 24], [11, 23, 25]] },
    { name = "L-Hip", points = [[26, 24, 23], [12, 24, 26]] },
    { name = "Spine", points = [[26, 24, 23], [25, 23, 24]] },
    { name = "Spine-Alignment", points = [[999, 998, 997]] },
    { name = "R-Ankle", points = [[25, 27, 31]] },
    { name = "L-Ankle", points = [[26, 28, 32]] },
]

show_labels = true
text_scale = 0.5
max_error_margin = 30.0 # 0 deg = Green, 10+ deg = Red
