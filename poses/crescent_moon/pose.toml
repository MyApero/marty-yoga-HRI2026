yoga_name = "Anjaneyasana"

[description]
context = "Crescent Moon (Anjaneyasana) pose deeply stretches and opens the sides of the body and improves core body strength, balance and concentration. Half moon strengthens the ankles and knees, improves circulation and energizes the entire body."
howto = "The body is in the standing position, with the feet together and rooted into the earth. The weight of the body is evenly distributed on the four corners of the feet. The pelvis is tucked. The ribcage is lifted. The neck is a natural extension of the spine and the chin is slightly tucked toward the sternum. The shoulders are relaxed as they rotate back and down. The arms at your sides. The arms are extend upwards toward the sky as you bend to one side, lengthening the opposite side of the rib cage and stretch."

