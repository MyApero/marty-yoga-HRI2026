yoga_name = "Virabhadrasana I"

[description]
context = "The left-side Warrior 1 (Virabhadrasana I) challenges balance and stability while engaging the stabilizing muscles of the left leg. It provides a deep stretch to the right psoas and hip flexor while building endurance in the triceps, quadriceps and calves."
howto = "From a standing position, the legs are in a wide stance with the feet aligned and flat on the earth. The right foot is in a 60-degree angle toward the front. The hips are squared. The inner thighs are rotated toward each other. The left knee is bent in a 90-degree angle directly above the ankle. The arms extend up to the sky with the biceps by the ears. The hands can be together or separated and facing each other with the fingers spread wide. The ribcage is lifted and the pelvis tucked. The gaze is forward."

