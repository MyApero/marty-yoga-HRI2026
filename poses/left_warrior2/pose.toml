yoga_name = "Virabhadrasana II"

[description]
context = "Warrior 2 on the left side mirrors the benefits of the right, balancing the body's strength and flexibility. It focuses on strengthening the left leg and opening the left side of the pelvic girdle, ensuring symmetrical muscle development."
howto = """Warrior 2 Pose:
1. From a wide-legged stance, turn your left foot out 90 degrees to point to the top of the mat. Turn your right foot slightly inward.
2. Align your left heel with the arch of your right foot.
3. Exhale and bend your left knee deeply until it is stacked directly over your left ankle, forming a right angle.
4. Press firmly through the outer edge of your right (back) foot to keep the back leg engaged and straight.
5. Extend your arms out to the sides at shoulder height, reaching through the fingertips.
6. Turn your head to look past your left fingers, keeping the torso long and centered between the legs."""

