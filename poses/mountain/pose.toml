[description]
context = "Tadasana (Mountain Pose) is a foundational standing yoga posture used in Sun Salutations and as a base for other standing poses. While it appears to be simple standing, it actively strengthens the abdomen, back, and legs while stretching the entire body. When performed with proper alignment, it improves posture, develops balance, eases sciatica, and lifts the foot arches."
howto = """1. Stand at the top of the mat with big toes touching and heels slightly apart.
2. Lift and spread toes, distributing weight evenly across both feet.
3. Engage thighs, lift kneecaps, and rotate thighs slightly inward without hyperextending knees.
4. Tilt sacrum forward for a neutral spine and lift the chest, drawing shoulder blades down the back.
5. Hold arms by sides with fingers spread and palms facing forward or inward.
6. Keep chin parallel to the floor, aligning ears, shoulders, hips, and ankles in a straight line."""

